<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <!-- 1. BROWSER LOCK: Is se code iPhone k Safari/Chrome aur APK dono me automatic screen par fit ho jayega -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 2. APPLE/SAFARI CONFIG: Safari browser me full app look dene k leye -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>My Universal App</title>
    
    <style>
        /* --- 3. BROWSER & APK COMPATIBILITY STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* Mobile browser par click grey box khatam krne k leye */
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden; /* Screen horizontal scroll hoke barbad nahi hogi */
            background-color: #ffffff; /* Aap ki app ka jo bg color hai wo rakh sakte hain */
            -webkit-text-size-adjust: 100%; /* iPhone landscape mode me text khud barha nahi karega */
        }

        /* --- NOTE FOR YOU ---
           Aap k code ka baqi saara CSS design aur elements bilkul is k neeche wese hi rahenge.
           App ki baki CSS coding me koi tabdeeli krne ki zaroorat nahi hai.
        ----------------------- */
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- AAP KI APP KA JITNA BHI HTML CODE HAI,     -->
    <!-- WO IS BODY K ANDAR WESE KA WESE HI RAHÈ GA -->
    <!-- ========================================== -->
    
    <div id="app-main-content">
        <!-- Aap ka mojuda code yahan aayega -->
        <h1 style="text-align: center; margin-top: 50px; font-family: sans-serif;">App is Live on Browser!</h1>
    </div>

    <!-- ========================================== -->
    <!-- AAP KI APP KI JITNI BHI JAVASCRIPT HAI,    -->
    <!-- WO NEECHE WESE HI RAHÈ GI                  -->
    <!-- ========================================== -->
    <script>
        // Aap ka sara js logic yahan perfectly kaam karega
    </script>

</body>
</html>
